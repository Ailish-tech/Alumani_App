version: "3.8"

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: alumniconnect-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    restart: unless-stopped

  typesense:
    image: typesense/typesense:27.1
    container_name: alumniconnect-typesense
    restart: always
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: '--data-dir /data --api-key=your_typesense_api_key --enable-cors'

  redis:
    image: redis:7-alpine
    container_name: alumniconnect-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  typesense-data:
  redis-data:
